name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: MultiHUD
        run: xcodegen generate

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Import provisioning profiles
        env:
          MAIN_PROFILE_BASE64: ${{ secrets.MAIN_PROFILE_BASE64 }}
          EXTENSION_PROFILE_BASE64: ${{ secrets.EXTENSION_PROFILE_BASE64 }}
        run: |
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_PATH"
          echo -n "$MAIN_PROFILE_BASE64" | base64 --decode -o "$PP_PATH/MultiHUD.provisionprofile"
          echo -n "$EXTENSION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH/CameraExtension.provisionprofile"

      - name: Archive
        working-directory: MultiHUD
        run: |
          xcodebuild archive \
            -scheme MultiHUD \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/MultiHUD.xcarchive" \
            CODE_SIGN_STYLE=Manual

      - name: Export app
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>HGS3GTCF73</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>net.fakeapps.MultiHUD</key>
              <string>MultiHUD Developer ID</string>
              <key>net.fakeapps.MultiHUD.CameraExtension</key>
              <string>MultiHUD CameraExtension Developer ID</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/MultiHUD.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "MultiHUD" \
            -srcfolder "$RUNNER_TEMP/export/MultiHUD.app" \
            -ov -format UDZO \
            "$RUNNER_TEMP/MultiHUD-${{ github.ref_name }}.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          xcrun notarytool submit "$RUNNER_TEMP/MultiHUD-${{ github.ref_name }}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id HGS3GTCF73 \
            --wait
          xcrun stapler staple "$RUNNER_TEMP/MultiHUD-${{ github.ref_name }}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/MultiHUD-${{ github.ref_name }}.dmg
          generate_release_notes: true
